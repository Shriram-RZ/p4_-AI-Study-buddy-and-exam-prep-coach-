services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: studybuddy
      POSTGRES_PASSWORD: studybuddy
      POSTGRES_DB: studybuddy
    ports:
      - "5432:5432"
    volumes:
      - studybuddy_pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U studybuddy"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+psycopg2://studybuddy:studybuddy@postgres:5432/studybuddy
      ENVIRONMENT: development
      JWT_SECRET: ${JWT_SECRET:-dev-secret-change-me}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      CORS_ORIGINS: '["http://localhost:3000"]'
    ports:
      - "8000:8000"

volumes:
  studybuddy_pg:
